<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Analytics Pro - Mode Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1d1d1f;
        }
        .samsung-blue { color: #007aff; }
        .samsung-bg-blue { background-color: #007aff; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
        }
        .column-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin: 4rem 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-result { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 w-full px-6 py-4 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter">SPC<span class="samsung-blue">PRO</span></div>
            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Statistical Mode Analysis</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black tracking-tight mb-2">Process Capability Dashboard</h1>
            <p class="text-gray-500 font-medium">데이터의 평균, 규격, 그리고 최빈값을 정밀 분석합니다.</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass-card p-8 border-2 border-dashed border-gray-200 hover:border-blue-400 transition cursor-pointer text-center" id="dropZone">
                <input type="file" id="fileInput" class="hidden" accept=".csv">
                <div class="text-blue-500 mb-2">● CSV 드래그 또는 클릭</div>
                <p class="text-sm text-gray-400 italic">1행:제목 | 2행:LSL | 3행:USL | 4행+:데이터</p>
            </div>
            <button id="startBtn" disabled class="glass-card samsung-bg-blue text-white font-black text-xl opacity-50 cursor-not-allowed transition hover:brightness-110">
                분석 실행 (RUN ANALYSIS)
            </button>
        </section>

        <div id="summaryDashboard" class="hidden mb-12 animate-result">
            <div class="glass-card p-6 border-l-8 border-blue-600 shadow-xl">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest">Quick Overview (Cpk)</h3>
                <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            </div>
        </div>

        <div id="resultsWrapper" class="space-y-12"></div>
    </main>

    <script>
        let rawData = [];
        let columnsCount = 0;

        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const resultsWrapper = document.getElementById('resultsWrapper');
        const summaryDashboard = document.getElementById('summaryDashboard');
        const summaryCards = document.getElementById('summaryCards');
        const dropZone = document.getElementById('dropZone');

        // 파일 업로드 처리
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-blue-50');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            Papa.parse(file, {
                complete: (results) => {
                    rawData = results.data.filter(row => row.some(cell => cell.trim() !== ""));
                    if (rawData.length < 4) return alert("데이터 형식이 부족합니다.");
                    columnsCount = rawData[0].length;
                    startBtn.disabled = false;
                    startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    dropZone.innerHTML = `<div class='text-blue-600 font-bold'>✓ ${file.name} 로드됨</div>`;
                }
            });
        }

        // 최빈값 계산 로직 (구간화 기법 적용)
        function calculateMode(values) {
            if (values.length === 0) return null;
            
            // 데이터가 소수점일 경우 빈도가 겹치지 않으므로, 정밀도를 조절하여 그룹화
            // 여기서는 소수점 2째자리까지 반올림하여 빈도를 체크합니다.
            const counts = {};
            let maxCount = 0;
            let modeVal = values[0];

            values.forEach(v => {
                const rounded = Math.round(v * 100) / 100; // 소수점 2자리 그룹화
                counts[rounded] = (counts[rounded] || 0) + 1;
                if (counts[rounded] > maxCount) {
                    maxCount = counts[rounded];
                    modeVal = rounded;
                }
            });
            return modeVal;
        }

        startBtn.onclick = () => {
            resultsWrapper.innerHTML = '';
            summaryCards.innerHTML = '';
            summaryDashboard.classList.remove('hidden');

            for (let i = 0; i < columnsCount; i++) {
                analyze(i);
            }
        };

        function analyze(idx) {
            const title = rawData[0][idx] || `Item ${idx+1}`;
            const lsl = parseFloat(rawData[1][idx]);
            const usl = parseFloat(rawData[2][idx]);
            const values = rawData.slice(3).map(row => parseFloat(row[idx])).filter(v => !isNaN(v));

            if (values.length < 2) return;

            const n = values.length;
            const mean = values.reduce((a, b) => a + b, 0) / n;
            const mode = calculateMode(values);
            const std = Math.sqrt(values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1));
            
            const cpk = Math.min((usl - mean) / (3 * std), (mean - lsl) / (3 * std));

            // Summary Card
            const sCard = document.createElement('div');
            sCard.className = 'bg-gray-50 p-3 rounded-xl border border-gray-100 text-center';
            sCard.innerHTML = `<div class="text-[10px] font-bold text-gray-400 truncate">${title}</div><div class="text-lg font-black text-blue-600">${cpk.toFixed(2)}</div>`;
            summaryCards.appendChild(sCard);

            // UI Section
            const section = document.createElement('div');
            section.className = 'animate-result glass-card p-8 shadow-lg mb-12';
            section.innerHTML = `
                <h2 class="text-2xl font-black mb-6 text-gray-800 border-l-4 border-blue-500 pl-4">${title}</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span>평균 (Mean)</span><b class="text-green-600">${mean.toFixed(4)}</b></div>
                        <div class="flex justify-between p-3 bg-purple-50 rounded-lg"><span>최빈값 (Mode)</span><b class="text-purple-600">${mode.toFixed(4)}</b></div>
                        <div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span>표준편차 (Std)</span><b>${std.toFixed(4)}</b></div>
                        <div class="flex justify-between p-3 bg-red-50 rounded-lg"><span>규격 (LSL/USL)</span><b>${lsl}/${usl}</b></div>
                        <div class="mt-4 p-4 samsung-bg-blue text-white rounded-xl text-center">
                            <div class="text-xs opacity-80">Process Capability (Cpk)</div>
                            <div class="text-3xl font-black">${cpk.toFixed(3)}</div>
                        </div>
                    </div>
                    <div class="lg:col-span-2 h-[300px]">
                        <canvas id="chart-${idx}"></canvas>
                    </div>
                </div>
            `;
            resultsWrapper.appendChild(section);

            renderChart(idx, mean, mode, std, lsl, usl, values);
        }

        function renderChart(id, mean, mode, std, lsl, usl, values) {
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            const points = [];
            const minX = Math.min(lsl, ...values) - (std);
            const maxX = Math.max(usl, ...values) + (std);
            for (let x = minX; x <= maxX; x += (maxX - minX) / 100) {
                const y = (1 / (std * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mean) / std, 2));
                points.push({ x, y });
            }

            new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '분포',
                        data: points,
                        showLine: true,
                        borderColor: '#007aff',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(0, 122, 255, 0.05)',
                        tension: 0.4
                    }, {
                        label: '실제데이터',
                        data: values.map(v => ({ x: v, y: 0 })),
                        pointBackgroundColor: 'rgba(0,0,0,0.2)',
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { display: false }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                },
                plugins: [{
                    afterDraw: (chart) => {
                        const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                        const draw = (val, label, color, dash = false) => {
                            const px = x.getPixelForValue(val);
                            ctx.save();
                            ctx.beginPath();
                            if (dash) ctx.setLineDash([5, 5]);
                            ctx.moveTo(px, top); ctx.lineTo(px, bottom);
                            ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
                            ctx.fillStyle = color; ctx.font = 'bold 10px sans-serif';
                            ctx.fillText(label, px + 5, top + 15);
                            ctx.restore();
                        };
                        draw(lsl, 'LSL', '#ff3b30', true);
                        draw(usl, 'USL', '#ff3b30', true);
                        draw(mean, 'MEAN', '#34c759');
                        draw(mode, 'MODE', '#af52de'); // 최빈값 보라색 표시
                    }
                }]
            });
        }
    </script>
</body>
</html>
