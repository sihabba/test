<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Analytics Pro - Multi Column Dashboard</title>
    <!-- Tailwind CSS for Premium Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for Excel/CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .samsung-blue { color: #007aff; }
        .samsung-bg-blue { background-color: #007aff; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }
        .btn-primary {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }
        .hidden-section { display: none; }
        canvas { max-height: 450px !important; width: 100% !important; }
        .column-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e2e8f0, transparent);
            margin: 4rem 0;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 w-full px-6 py-4 bg-white/70 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight">SPC<span class="samsung-blue">Analytics</span> <span class="text-xs font-normal text-gray-400 ml-2">v2.0 Multi-Core</span></div>
            <div class="hidden md:flex space-x-8 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-blue-600 transition">다중 분석 모드</a>
                <a href="#" class="hover:text-blue-600 transition">보고서 생성</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Header Section -->
        <header class="text-center mb-16">
            <h1 class="text-5xl font-bold tracking-tight mb-4">다중 공정 능력 분석</h1>
            <p class="text-xl text-gray-500 font-light italic">모든 열(A, B, C...)의 데이터를 한 번에 분석하고 시각화합니다.</p>
        </header>

        <!-- Upload & Controls Section -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <!-- Upload Card -->
            <div class="glass-card p-8 shadow-sm flex flex-col justify-center items-center border-2 border-dashed border-gray-200 hover:border-blue-400 transition cursor-pointer" id="dropZone">
                <div class="mb-4 p-4 bg-blue-50 rounded-full">
                    <svg class="w-8 h-8 samsung-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <h3 class="text-lg font-semibold mb-2">데이터 파일 업로드</h3>
                <p class="text-sm text-gray-400 mb-6 text-center italic">열이 여러 개인 파일을 업로드하면<br>자동으로 모든 열을 분석합니다.</p>
                <input type="file" id="fileInput" class="hidden" accept=".csv">
                <button onclick="document.getElementById('fileInput').click()" class="px-6 py-2 bg-gray-100 rounded-full text-sm font-semibold hover:bg-gray-200 transition">파일 선택</button>
                <div id="fileStatus" class="mt-4 text-sm font-medium text-green-600 hidden italic"></div>
            </div>

            <!-- Start Button Card -->
            <div class="glass-card p-8 shadow-sm flex flex-col justify-center items-center">
                <h3 class="text-lg font-semibold mb-4 text-center">Batch Analysis Engine</h3>
                <p class="text-sm text-gray-400 mb-8 text-center italic">업로드된 모든 데이터를 일괄 분석합니다.</p>
                <button id="startBtn" disabled class="w-full py-4 samsung-bg-blue text-white rounded-2xl font-bold text-lg opacity-50 cursor-not-allowed btn-primary">
                    분석 시작 (Start Batch Analysis)
                </button>
            </div>
        </section>

        <!-- Container for All Results -->
        <div id="resultsWrapper" class="space-y-20 pb-20">
            <!-- 분석 결과 섹션들이 여기에 동적으로 생성됩니다 -->
        </div>

    </main>

    <footer class="py-10 text-center text-gray-400 text-xs border-t border-gray-100">
        &copy; 2024 SPC Analytics Pro. Enterprise Multi-Analysis Dashboard.
    </footer>

    <script>
        let rawData = [];
        let columnsCount = 0;
        let chartInstances = {};

        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const fileStatus = document.getElementById('fileStatus');
        const resultsWrapper = document.getElementById('resultsWrapper');

        fileInput.addEventListener('change', handleFileUpload);
        startBtn.addEventListener('click', runBatchAnalysis);

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                complete: function(results) {
                    // 빈 행 제거
                    rawData = results.data.filter(row => row.some(cell => cell !== ""));
                    
                    if (rawData.length < 4) {
                        alert("데이터 형식이 올바르지 않습니다. (1행: 이름, 2행: LSL, 3행: USL, 4행+: 데이터)");
                        return;
                    }

                    // 열 개수 확인
                    columnsCount = rawData[0].length;

                    fileStatus.innerText = `✓ ${file.name} 로드 완료 (${columnsCount}개의 분석 열 감지)`;
                    fileStatus.classList.remove('hidden');
                    startBtn.disabled = false;
                    startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        }

        function runBatchAnalysis() {
            if (rawData.length === 0) return;

            // 기존 결과 초기화
            resultsWrapper.innerHTML = '';
            
            // 각 열별로 분석 수행
            for (let i = 0; i < columnsCount; i++) {
                analyzeColumn(i);
            }

            // 첫 번째 결과로 부드럽게 스크롤
            resultsWrapper.scrollIntoView({ behavior: 'smooth' });
        }

        function analyzeColumn(colIndex) {
            const name = rawData[0][colIndex] || `Column ${colIndex + 1}`;
            const lsl = parseFloat(rawData[1][colIndex]);
            const usl = parseFloat(rawData[2][colIndex]);
            const values = rawData.slice(3).map(row => parseFloat(row[colIndex])).filter(val => !isNaN(val));

            if (values.length === 0) return;

            // 기초 통계 계산
            const count = values.length;
            const avg = values.reduce((a, b) => a + b, 0) / count;
            const sampleVariance = values.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / (count - 1);
            const stdev = Math.sqrt(sampleVariance);

            // SPC 계산
            const cp = (usl - lsl) / (6 * stdev);
            const cpk = Math.min((usl - avg) / (3 * stdev), (avg - lsl) / (3 * stdev));
            
            const popVariance = values.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / count;
            const popStdev = Math.sqrt(popVariance);
            const pp = (usl - lsl) / (6 * popStdev);
            const ppk = Math.min((usl - avg) / (3 * popStdev), (avg - lsl) / (3 * popStdev));

            // UI 생성
            createResultSection(colIndex, name, count, avg, stdev, lsl, usl, cp, cpk, pp, ppk);
            
            // 그래프 렌더링 (DOM 생성 후 실행을 위해 setTimeout 사용)
            setTimeout(() => {
                renderChart(colIndex, avg, stdev, lsl, usl, values);
            }, 0);
        }

        function createResultSection(id, name, n, mean, std, lsl, usl, cp, cpk, pp, ppk) {
            const section = document.createElement('div');
            section.className = 'animate-in fade-in duration-700';
            section.innerHTML = `
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-bold border-b-2 border-blue-500 inline-block pb-2 px-12 uppercase tracking-widest text-gray-800">
                        ${name}
                    </h2>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <!-- Left: Metrics -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="glass-card p-6 shadow-lg">
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Statistical Summary</h4>
                            <div class="space-y-4">
                                ${createMetricRow("샘플 갯수 (N)", n.toLocaleString())}
                                ${createMetricRow("평균 (Mean)", mean.toFixed(4))}
                                ${createMetricRow("표준편차 (Stdev)", std.toFixed(4))}
                                ${createMetricRow("LSL", lsl)}
                                ${createMetricRow("USL", usl)}
                            </div>
                        </div>
                        
                        <div class="glass-card p-6 shadow-lg border-l-8 border-blue-500">
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Process Capability</h4>
                            <div class="grid grid-cols-2 gap-3">
                                ${createSPCCard("Cp", cp)}
                                ${createSPCCard("Cpk", cpk)}
                                ${createSPCCard("Pp", pp)}
                                ${createSPCCard("Ppk", ppk)}
                            </div>
                        </div>
                    </div>

                    <!-- Right: Chart -->
                    <div class="lg:col-span-8">
                        <div class="glass-card p-8 shadow-lg h-full flex flex-col">
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Distribution Analysis</h4>
                            <div class="flex-grow">
                                <canvas id="chart-${id}"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                ${id < columnsCount - 1 ? '<div class="column-divider"></div>' : ''}
            `;
            resultsWrapper.appendChild(section);
        }

        function createMetricRow(label, value) {
            return `
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-sm text-gray-500 font-medium">${label}</span>
                    <span class="text-lg font-bold text-gray-800">${value}</span>
                </div>
            `;
        }

        function createSPCCard(label, value) {
            const val = value.toFixed(3);
            const colorClass = value < 1.33 ? 'text-red-500' : 'text-blue-600';
            return `
                <div class="bg-gray-50 p-4 rounded-2xl text-center">
                    <div class="text-[10px] text-gray-400 font-bold mb-1 uppercase">${label}</div>
                    <div class="text-2xl font-black ${colorClass}">${val}</div>
                </div>
            `;
        }

        function renderChart(id, mean, std, lsl, usl, values) {
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            
            const points = [];
            const minX = Math.min(lsl, ...values) - (std * 2.5);
            const maxX = Math.max(usl, ...values) + (std * 2.5);
            const step = (maxX - minX) / 100;

            for (let x = minX; x <= maxX; x += step) {
                const y = (1 / (std * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mean) / std, 2));
                points.push({ x: x, y: y });
            }

            new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [
                        {
                            label: 'Normal Dist',
                            data: points,
                            showLine: true,
                            fill: true,
                            backgroundColor: 'rgba(0, 122, 255, 0.05)',
                            borderColor: '#007aff',
                            borderWidth: 3,
                            pointRadius: 0,
                            tension: 0.4,
                            zIndex: 1
                        },
                        {
                            label: 'Samples',
                            data: values.map(v => ({ x: v, y: 0 })),
                            pointBackgroundColor: 'rgba(29, 29, 31, 0.3)',
                            pointRadius: 3,
                            zIndex: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 2000 },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Measured Value', font: { weight: '600' } },
                            grid: { color: '#f0f0f0' }
                        },
                        y: { display: false }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { 
                            callbacks: {
                                label: (context) => context.datasetIndex === 1 ? `Value: ${context.parsed.x.toFixed(3)}` : null
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'specLines',
                    afterDraw: (chart) => {
                        const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                        const drawLine = (val, label, color) => {
                            const xPos = x.getPixelForValue(val);
                            ctx.save();
                            ctx.beginPath();
                            ctx.setLineDash(label.includes('Mean') ? [] : [6, 4]);
                            ctx.moveTo(xPos, top);
                            ctx.lineTo(xPos, bottom);
                            ctx.lineWidth = 2;
                            ctx.strokeStyle = color;
                            ctx.stroke();
                            
                            ctx.fillStyle = color;
                            ctx.font = 'bold 11px Inter';
                            ctx.textAlign = 'center';
                            ctx.fillText(label, xPos, top - 10);
                            ctx.restore();
                        };
                        drawLine(lsl, `LSL: ${lsl}`, '#ff3b30');
                        drawLine(usl, `USL: ${usl}`, '#ff3b30');
                        drawLine(mean, `Mean: ${mean.toFixed(2)}`, '#34c759');
                    }
                }]
            });
        }

        // Drop zone interaction
        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-blue-500', 'bg-blue-50');
            }, false);
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            }, false);
        });
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length) {
                fileInput.files = files;
                handleFileUpload({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
